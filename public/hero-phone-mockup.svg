<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520" width="380" height="520">
  <defs>
    <linearGradient id="phoneFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c4a8"/>
      <stop offset="50%" style="stop-color:#d4a88a"/>
      <stop offset="100%" style="stop-color:#c49678"/>
    </linearGradient>
    <linearGradient id="sleeve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e5e5e5"/>
    </linearGradient>
    <filter id="phoneShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="-15" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="95" y="25" width="190" height="395" rx="5" ry="5"/>
    </clipPath>
  </defs>

  <!-- Hand and Arm -->
  <!-- Sleeve/Cuff -->
  <ellipse cx="200" cy="520" rx="120" ry="45" fill="url(#sleeve)"/>
  <rect x="80" y="475" width="240" height="50" fill="url(#sleeve)"/>

  <!-- Hand Base -->
  <path d="M60 400 Q40 450 80 500 L320 500 Q360 450 340 400 Q320 380 300 390 L100 390 Q80 380 60 400" fill="url(#skinTone)"/>

  <!-- Thumb -->
  <ellipse cx="58" cy="280" rx="22" ry="60" fill="url(#skinTone)" transform="rotate(-15 58 280)"/>
  <ellipse cx="52" cy="225" rx="16" ry="25" fill="url(#skinTone)" transform="rotate(-20 52 225)"/>

  <!-- Fingers holding phone (back) -->
  <ellipse cx="335" cy="180" rx="14" ry="45" fill="url(#skinTone)" transform="rotate(8 335 180)"/>
  <ellipse cx="348" cy="230" rx="13" ry="42" fill="url(#skinTone)" transform="rotate(12 348 230)"/>
  <ellipse cx="355" cy="285" rx="12" ry="38" fill="url(#skinTone)" transform="rotate(15 355 285)"/>
  <ellipse cx="350" cy="340" rx="11" ry="32" fill="url(#skinTone)" transform="rotate(18 350 340)"/>

  <!-- Phone Body -->
  <g filter="url(#phoneShadow)">
    <rect x="80" y="10" width="220" height="430" rx="32" ry="32" fill="url(#phoneFrame)"/>
    <rect x="85" y="15" width="210" height="420" rx="30" ry="30" fill="#1a1a1a"/>
  </g>

  <!-- Screen -->
  <rect x="95" y="25" width="190" height="395" rx="5" ry="5" fill="url(#screenBg)"/>

  <!-- Dynamic Island / Notch -->
  <rect x="155" y="32" width="70" height="22" rx="11" ry="11" fill="#1a1a1a"/>

  <!-- Screen Content -->
  <g clip-path="url(#screenClip)">
    <!-- Header -->
    <rect x="95" y="60" width="190" height="45" fill="#1f2544"/>
    <text x="115" y="88" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Search stores &amp; products</text>

    <!-- Search Bar -->
    <rect x="108" y="118" width="164" height="36" rx="18" ry="18" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="125" cy="136" r="7" fill="none" stroke="#999" stroke-width="1.5"/>
    <line x1="130" y1="141" x2="133" y2="144" stroke="#999" stroke-width="1.5"/>
    <text x="140" y="140" fill="#999" font-family="system-ui" font-size="11">Search pouches...</text>

    <!-- Product Card 1 -->
    <rect x="108" y="168" width="164" height="70" rx="10" ry="10" fill="white" stroke="#f0f0f0" stroke-width="1"/>
    <rect x="118" y="178" width="40" height="40" rx="8" ry="8" fill="#1f2544"/>
    <text x="126" y="203" fill="white" font-family="system-ui" font-size="10" font-weight="bold">ZYN</text>
    <text x="166" y="192" fill="#1a1f3a" font-family="system-ui" font-size="11" font-weight="600">ZYN Cool Mint</text>
    <text x="166" y="206" fill="#666" font-family="system-ui" font-size="9">Strong - 6mg</text>
    <rect x="166" y="215" width="28" height="16" rx="4" ry="4" fill="#dcfce7"/>
    <text x="172" y="226" fill="#16a34a" font-family="system-ui" font-size="9" font-weight="600">$4.99</text>
    <text x="198" y="226" fill="#999" font-family="system-ui" font-size="8">5 stores</text>

    <!-- Product Card 2 -->
    <rect x="108" y="248" width="164" height="70" rx="10" ry="10" fill="white" stroke="#f0f0f0" stroke-width="1"/>
    <rect x="118" y="258" width="40" height="40" rx="8" ry="8" fill="#7c3aed"/>
    <text x="122" y="283" fill="white" font-family="system-ui" font-size="9" font-weight="bold">VELO</text>
    <text x="166" y="272" fill="#1a1f3a" font-family="system-ui" font-size="11" font-weight="600">Velo Freeze X-Strong</text>
    <text x="166" y="286" fill="#666" font-family="system-ui" font-size="9">X-Strong - 11mg</text>
    <rect x="166" y="295" width="28" height="16" rx="4" ry="4" fill="#dcfce7"/>
    <text x="172" y="306" fill="#16a34a" font-family="system-ui" font-size="9" font-weight="600">$5.49</text>
    <text x="198" y="306" fill="#999" font-family="system-ui" font-size="8">8 stores</text>

    <!-- Product Card 3 -->
    <rect x="108" y="328" width="164" height="70" rx="10" ry="10" fill="white" stroke="#f0f0f0" stroke-width="1"/>
    <rect x="118" y="338" width="40" height="40" rx="8" ry="8" fill="#ea580c"/>
    <text x="126" y="363" fill="white" font-family="system-ui" font-size="10" font-weight="bold">ON!</text>
    <text x="166" y="352" fill="#1a1f3a" font-family="system-ui" font-size="11" font-weight="600">On! Wintergreen</text>
    <text x="166" y="366" fill="#666" font-family="system-ui" font-size="9">Regular - 4mg</text>
    <rect x="166" y="375" width="28" height="16" rx="4" ry="4" fill="#dcfce7"/>
    <text x="172" y="386" fill="#16a34a" font-family="system-ui" font-size="9" font-weight="600">$3.99</text>
    <text x="198" y="386" fill="#999" font-family="system-ui" font-size="8">4 stores</text>
  </g>

  <!-- Home Indicator -->
  <rect x="160" y="405" width="60" height="4" rx="2" ry="2" fill="#666"/>

  <!-- Palm area covering bottom of phone -->
  <path d="M60 400 Q50 420 70 440 Q100 470 190 480 Q280 470 310 440 Q330 420 320 400 L320 385 L60 385 Z" fill="url(#skinTone)"/>
</svg>